<!DOCTYPE html>
<html>
<head>
<title>Reservation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#3E2723,#5D4037,#8D6E63,#EFEBE9);
}

header{
background:linear-gradient(to right,#3E2723,#5D4037);
color:white;
text-align:center;
padding:20px;
}

nav{
margin-top:15px;
}

nav a{
text-decoration:none;
color:#D7A86E;
margin:15px;
font-size:20px;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
padding:30px;
background-image: url("coffee_shop.png");
background-repeat: no-repeat;
background-size: cover;
}

.card{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:15px;
color:white;
}

h2{
text-align:center;
color:#FFD180;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
background:#D7A86E;
color:#3E2723;
padding:12px 25px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

footer{
background:#3E2723;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<h1>Brew & Bite Cafe ☕</h1>

<nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="menu.html">Menu</a>
        <a href="reservations.html">Reservation</a>
        <a href="contact.html">Contact</a>
</nav>

</header >

<div class="container">

<div class="card">

<h2>Reserve Your Table</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Phone Number">

<input type="date">

<input type="time">

<input type="number" placeholder="Number of Guests">

<textarea rows="5" placeholder="Special Request"></textarea>

<button type="submit">Reserve Now</button>

</form>

</div>

</div>

<footer>

<p>📅 Book Your Coffee Experience</p>

</footer>
